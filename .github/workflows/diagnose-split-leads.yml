name: Diagnose split leads patch chain

on:
  pull_request:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch production dashboard source
        run: |
          curl --fail --silent --show-error \
            -H 'x-aiguka-diagnostic: AIGUKA_DIAG_20260724_SPLIT_LEADS_9f31' \
            'https://ezygfpeeqbbirdeazene.supabase.co/functions/v1/aiguka-diagnostic-dashboard-source' \
            -o v7-dashboard-stable.js
          node --check v7-dashboard-stable.js
      - name: Apply known-good dashboard patches
        run: |
          node patch-v7-report-accuracy.js
          node patch-v7-product-detection.js
          node patch-v7-navigation.js
          node patch-v7-pancake-toggle.js
          node patch-v7-lead-filters.js
          node patch-v7-daily-grouped.js
          node patch-v7-daily-staff-history.js
          node patch-v7-daily-layout-sample.js
          node patch-v7-filter-final.js
          node patch-v7-daily-staff-aligned.js
          node patch-v7-daily-runtime-self-contained.js
          node patch-v7-leads-meta-primary.js
          node patch-v7-leads-referral-source.js
          node patch-v7-pancake-tag-completeness.js
          node patch-v7-pancake-tag-final.js
          node patch-v7-daily-final-anchor-fix.js
          node patch-v7-daily-final.js
          node patch-v7-daily-runtime-fallback.js
          node patch-v7-lead-table-v4.js
          node patch-v7-lead-filter-logical.js
          node patch-v7-lead-contact-ui.js
          node patch-v7-null-safety.js
          node patch-v7-runtime-integrity.js
          node patch-v7-lead-meta-insights-truth.js
          node patch-v7-lead-reel-old-ad-attribution.js
          node patch-v7-lead-reel-reply-guard.js
          node --check v7-dashboard-stable.js
      - name: Apply split Lead performance
        run: node patch-v7-split-leads-ad-performance.js
      - name: Check generated dashboard
        run: node --check v7-dashboard-stable.js
      - name: Verify new routes and menu
        run: |
          grep -q "app.get('/ad-performance'" v7-dashboard-stable.js
          grep -q "Hiệu quả quảng cáo" v7-dashboard-stable.js
          grep -q "Tra cứu từng khách" v7-dashboard-stable.js
