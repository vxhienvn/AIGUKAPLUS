name: Diagnose split leads patch chain

on:
  pull_request:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prepare Pancake service patches
        run: |
          node patch-v7-pancake-classifier.js
          node patch-v7-pancake-history.js
          node patch-v7-pancake-tag-parser.js
      - name: Materialize production dashboard source
        run: |
          curl --fail --silent --show-error \
            -H 'x-aiguka-diagnostic: AIGUKA_DIAG_20260724_SPLIT_LEADS_9f31' \
            'https://ezygfpeeqbbirdeazene.supabase.co/functions/v1/aiguka-diagnostic-dashboard-source' \
            -o /tmp/aiguka-dashboard-raw.js
          cat > /tmp/aiguka-materialize-server.mjs <<'NODE'
          import http from 'node:http';
          import fs from 'node:fs';
          const source=fs.readFileSync('/tmp/aiguka-dashboard-raw.js');
          const payload=JSON.stringify({ok:true,chunks:[source.toString('base64')]});
          http.createServer((req,res)=>{
            res.writeHead(200,{'content-type':'application/json'});
            res.end(payload);
          }).listen(8787,'127.0.0.1');
          NODE
          node /tmp/aiguka-materialize-server.mjs &
          SERVER_PID=$!
          sleep 1
          SUPABASE_URL='http://127.0.0.1:8787' SUPABASE_PUBLISHABLE_KEY='diagnostic' node materialize-v7-dashboard.js
          kill "$SERVER_PID"
          node --check v7-dashboard-stable.js
      - name: Report accuracy
        run: node patch-v7-report-accuracy.js
      - name: Product detection
        run: node patch-v7-product-detection.js
      - name: Navigation
        run: node patch-v7-navigation.js
      - name: Pancake toggle
        run: node patch-v7-pancake-toggle.js
      - name: Lead filters
        run: node patch-v7-lead-filters.js
      - name: Daily grouped
        run: node patch-v7-daily-grouped.js
      - name: Daily staff history
        run: node patch-v7-daily-staff-history.js
      - name: Daily layout sample
        run: node patch-v7-daily-layout-sample.js
      - name: Filter final
        run: node patch-v7-filter-final.js
      - name: Daily staff aligned
        run: node patch-v7-daily-staff-aligned.js
      - name: Daily runtime self contained
        run: node patch-v7-daily-runtime-self-contained.js
      - name: Leads Meta primary
        run: node patch-v7-leads-meta-primary.js
      - name: Leads referral source
        run: node patch-v7-leads-referral-source.js
      - name: Pancake tag completeness
        run: node patch-v7-pancake-tag-completeness.js
      - name: Pancake tag final
        run: node patch-v7-pancake-tag-final.js
      - name: Daily final anchor fix
        run: node patch-v7-daily-final-anchor-fix.js
      - name: Daily final
        run: node patch-v7-daily-final.js
      - name: Daily runtime fallback
        run: node patch-v7-daily-runtime-fallback.js
      - name: Lead table v4
        run: node patch-v7-lead-table-v4.js
      - name: Lead filter logical
        run: node patch-v7-lead-filter-logical.js
      - name: Lead contact UI
        run: node patch-v7-lead-contact-ui.js
      - name: Null safety
        run: node patch-v7-null-safety.js
      - name: Runtime integrity
        run: node patch-v7-runtime-integrity.js
      - name: Lead Meta insights truth
        run: node patch-v7-lead-meta-insights-truth.js
      - name: Old ad attribution
        run: node patch-v7-lead-reel-old-ad-attribution.js
      - name: Reel reply guard
        run: node patch-v7-lead-reel-reply-guard.js
      - name: Restore split marker compatibility
        run: node patch-v7-split-leads-compat.js
      - name: Capture split patch result
        run: |
          set +e
          node patch-v7-split-leads-ad-performance.js > /tmp/aiguka-split.log 2>&1
          echo $? > /tmp/aiguka-split.status
          exit 0
      - name: Requirement marker exists
        run: '! grep -q "SPLIT_LEADS_REQUIRES_META_INSIGHTS_TRUTH" /tmp/aiguka-split.log'
      - name: Lead page anchor exists
        run: '! grep -q "SPLIT_LEADS_PAGE_ANCHOR_NOT_FOUND" /tmp/aiguka-split.log'
      - name: Navigation anchor exists
        run: '! grep -q "SPLIT_LEADS_NAV_ANCHOR_NOT_FOUND" /tmp/aiguka-split.log'
      - name: Route anchor exists
        run: '! grep -q "SPLIT_LEADS_ROUTE_ANCHOR_NOT_FOUND" /tmp/aiguka-split.log'
      - name: CSS anchor exists
        run: '! grep -q "SPLIT_LEADS_CSS_ANCHOR_NOT_FOUND" /tmp/aiguka-split.log'
      - name: Generated split syntax is valid
        run: '! grep -q "SPLIT_LEADS_SYNTAX" /tmp/aiguka-split.log'
      - name: Split patch completed
        run: test "$(cat /tmp/aiguka-split.status)" = "0"
      - name: Check generated dashboard
        run: node --check v7-dashboard-stable.js
      - name: Verify new routes and menu
        run: |
          grep -q "app.get('/ad-performance'" v7-dashboard-stable.js
          grep -q "Hiệu quả quảng cáo" v7-dashboard-stable.js
          grep -q "Tra cứu từng khách" v7-dashboard-stable.js
