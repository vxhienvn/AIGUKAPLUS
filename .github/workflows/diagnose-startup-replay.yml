name: Diagnose Railway startup replay

on:
  pull_request:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Download verified dashboard snapshot from direct chunk reader
        run: |
          curl --fail --silent --show-error --location --max-time 60 \
            'https://ezygfpeeqbbirdeazene.supabase.co/functions/v1/aiguka-dashboard-snapshot-export-temp?token=snap_7f1c9a34d2e6485b9a23c6ef' \
            --output /tmp/v7-dashboard-stable.snapshot.js
          test "$(wc -c < /tmp/v7-dashboard-stable.snapshot.js)" = "23115"
          test "$(md5sum /tmp/v7-dashboard-stable.snapshot.js | cut -d' ' -f1)" = "971b141fedd159796a7d57a1467aaf69"
      - name: Upload dashboard snapshot
        uses: actions/upload-artifact@v4
        with:
          name: v7-dashboard-stable-snapshot
          path: /tmp/v7-dashboard-stable.snapshot.js
          if-no-files-found: error
          retention-days: 1
