name: Apply catalog key rename changes

on:
  push:
    branches:
      - agent/unlock-catalog-key

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unlock-catalog-key
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Apply source changes
        run: python3 scripts/apply_catalog_key_rename_patch.py

      - name: Validate JavaScript and tests
        run: |
          npm install --ignore-scripts
          node --check public/drive-slides-v8-render.js
          node --check src/routes/mappingCenterRoutes.js
          npm test
          git diff --check

      - name: Commit verified changes
        run: |
          git rm .github/workflows/apply-catalog-key-rename.yml scripts/apply_catalog_key_rename_patch.py
          git config user.name "AIGUKA Automation"
          git config user.email "actions@users.noreply.github.com"
          git add public/drive-slides-v8.html public/drive-slides-v8-render.js src/routes/mappingCenterRoutes.js tests/catalog-key-rename.test.js
          git commit -m "feat(mapping): allow safe catalog key rename"
          git push origin HEAD:agent/unlock-catalog-key
